<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ds:comp:pagination-001 — Pagination / Load More</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../tokens/tokens.css" />
  <style>
    /* tokens.css imported above — no :root needed */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); background: var(--sm-bg-page); padding: var(--space-xl); color: var(--sm-text-primary); }
    .showcase { max-width: 500px; }
    .showcase__title { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); margin-bottom: var(--space-xl); }
    .showcase__section { margin-bottom: var(--space-2xl); }
    .showcase__label { font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); color: var(--sm-text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: var(--space-md); }

    /* ===== Load More Button ===== */
    .load-more { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 0; }
    .load-more__info { font-size: 13px; color: #94a3b8; }
    .load-more__btn {
      padding: 10px 32px; font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
      background: var(--color-primary-600); color: #fff; border: none; border-radius: var(--radius-md);
      cursor: pointer; font-family: var(--font-family); transition: background var(--transition-fast);
    }
    .load-more__btn:hover { background: var(--color-primary-700); }
    .load-more__btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Loading variant */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }

    /* ===== Numbered Pagination ===== */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .pagination__btn {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500; border: 1px solid var(--color-border);
      border-radius: 8px; background: #fff; cursor: pointer; font-family: var(--font-family);
      color: #475569; transition: all 150ms ease;
    }
    .pagination__btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .pagination__btn--active { background: var(--color-primary-600); color: #fff; border-color: var(--color-primary-600); font-weight: var(--font-weight-semibold); }
    .pagination__btn--disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .pagination__dots { width: 36px; text-align: center; font-size: 14px; color: #94a3b8; }

    /* ===== Progress bar with count ===== */
    .progress-info { text-align: center; }
    .progress-info__text { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .progress-bar { width: 200px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 12px; overflow: hidden; }
    .progress-bar__fill { height: 100%; background: var(--color-primary-600); border-radius: 2px; transition: width 300ms ease; }

    /* ===== End of list ===== */
    .end-of-list { text-align: center; padding: 16px; font-size: 13px; color: #94a3b8; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .end-of-list::before, .end-of-list::after { content: ''; width: 40px; height: 1px; background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="showcase" data-ds-id="ds:comp:pagination-001">
    <h2 class="showcase__title">ds:comp:pagination-001 — Pagination</h2>

    <!-- Load More (default) -->
    <section class="showcase__section">
      <h3 class="showcase__label">Load More — Default</h3>
      <div class="load-more" data-ds-id="ds:comp:pagination-001--load-more">
        <div class="progress-info">
          <div class="progress-info__text">Đang hiển thị 10 / 47 kèo</div>
          <div class="progress-bar"><div class="progress-bar__fill" style="width:21%;"></div></div>
        </div>
        <button class="load-more__btn">Xem thêm kèo ↓</button>
      </div>
    </section>

    <!-- Load More (loading) -->
    <section class="showcase__section">
      <h3 class="showcase__label">Load More — Loading</h3>
      <div class="load-more" data-ds-id="ds:comp:pagination-001--loading">
        <button class="load-more__btn" disabled><span class="spinner"></span> Đang tải...</button>
      </div>
    </section>

    <!-- Numbered pagination -->
    <section class="showcase__section">
      <h3 class="showcase__label">Numbered Pagination</h3>
      <div class="pagination" data-ds-id="ds:comp:pagination-001--numbered">
        <button class="pagination__btn pagination__btn--disabled">‹</button>
        <button class="pagination__btn pagination__btn--active">1</button>
        <button class="pagination__btn">2</button>
        <button class="pagination__btn">3</button>
        <span class="pagination__dots">…</span>
        <button class="pagination__btn">12</button>
        <button class="pagination__btn">›</button>
      </div>
    </section>

    <!-- End of list -->
    <section class="showcase__section">
      <h3 class="showcase__label">End of List</h3>
      <div class="end-of-list" data-ds-id="ds:comp:pagination-001--end">🏸 Đã xem hết kèo</div>
      <div class="progress-info" style="margin-top:4px;">
        <div class="progress-info__text">47 / 47 kết quả</div>
        <div class="progress-bar"><div class="progress-bar__fill" style="width:100%;"></div></div>
      </div>
    </section>
  </div>
</body>
</html>
