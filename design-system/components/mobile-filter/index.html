<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ds:comp:mobile-filter-001 — Mobile Filter Bottom Sheet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../tokens/tokens.css" />
  <style>
    /* tokens.css imported above — no :root needed */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); background: #1e293b; padding: 0; color: #1e293b; display: flex; align-items: flex-end; justify-content: center; min-height: 100vh; }

    /* Backdrop */
    .backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.5); }

    /* Bottom sheet */
    .bottom-sheet {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: #fff; border-radius: 20px 20px 0 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
      max-height: 85vh; display: flex; flex-direction: column;
      animation: slideUp 300ms ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .bottom-sheet__handle { display: flex; justify-content: center; padding: 10px 0 4px; }
    .bottom-sheet__bar { width: 36px; height: 4px; background: #cbd5e1; border-radius: 2px; }

    .bottom-sheet__header { display: flex; justify-content: space-between; align-items: center; padding: 4px 20px 12px; }
    .bottom-sheet__title { font-size: 18px; font-weight: 700; }
    .bottom-sheet__clear { font-size: 13px; color: #ef4444; background: none; border: none; cursor: pointer; font-family: var(--font-family); font-weight: 500; }

    .bottom-sheet__body { flex: 1; overflow-y: auto; padding: 0 20px 16px; }

    .filter-group { margin-bottom: 16px; }
    .filter-group__label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 8px; display: block; }
    .filter-input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1.5px solid var(--color-border); border-radius: 8px; font-family: var(--font-family); }
    .filter-input:focus { outline: none; border-color: var(--color-primary); }
    .filter-input::placeholder { color: #94a3b8; }

    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 14px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--color-border); border-radius: 9999px; background: #fff; color: #475569; cursor: pointer; font-family: var(--font-family); }
    .filter-btn--active { background: #f0fdf4; border-color: #86efac; color: var(--color-primary); font-weight: 600; }

    .filter-select { width: 100%; padding: 10px 14px; font-size: 14px; border: 1.5px solid var(--color-border); border-radius: 8px; font-family: var(--font-family); background: #fff; }

    .filter-time-range { display: flex; gap: 8px; align-items: center; }
    .filter-time-range span { color: #94a3b8; }
    .filter-time { flex: 1; padding: 10px; font-size: 14px; border: 1.5px solid var(--color-border); border-radius: 8px; font-family: var(--font-family); }

    .bottom-sheet__footer { padding: 12px 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; background: #fff; border-radius: 0 0 0 0; }
    .btn { flex: 1; padding: 12px; font-size: 15px; font-weight: 600; border: 1.5px solid transparent; border-radius: 10px; cursor: pointer; font-family: var(--font-family); text-align: center; }
    .btn--secondary { background: #f1f5f9; color: #475569; border-color: var(--color-border); }
    .btn--primary { background: var(--color-primary); color: #fff; }

    .active-count { font-size: 12px; font-weight: 500; color: var(--color-primary); text-align: center; padding: 4px 0; }
  </style>
</head>
<body>
  <div class="backdrop"></div>
  <div class="bottom-sheet" data-ds-id="ds:comp:mobile-filter-001">
    <div class="bottom-sheet__handle"><div class="bottom-sheet__bar"></div></div>
    <div class="bottom-sheet__header">
      <h2 class="bottom-sheet__title">🔍 Bộ lọc</h2>
      <button class="bottom-sheet__clear">Xóa tất cả</button>
    </div>
    <div class="active-count">3 bộ lọc đang bật</div>

    <div class="bottom-sheet__body">
      <div class="filter-group">
        <label class="filter-group__label">📅 Ngày chơi</label>
        <input class="filter-input" type="date" value="2026-03-24" />
      </div>
      <div class="filter-group">
        <label class="filter-group__label">⏰ Khung giờ</label>
        <div class="filter-time-range">
          <input class="filter-time" type="time" value="18:00" />
          <span>→</span>
          <input class="filter-time" type="time" value="22:00" />
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">🎯 Trình độ</label>
        <div class="filter-btns">
          <button class="filter-btn">Y</button>
          <button class="filter-btn">Y+</button>
          <button class="filter-btn">TBY</button>
          <button class="filter-btn">TBY+</button>
          <button class="filter-btn filter-btn--active">TB</button>
          <button class="filter-btn filter-btn--active">TB+</button>
          <button class="filter-btn">TB++</button>
          <button class="filter-btn">Khá</button>
          <button class="filter-btn">Giỏi</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">📍 Khoảng cách</label>
        <select class="filter-select"><option>Tất cả</option><option>1 km</option><option>3 km</option><option selected>5 km</option><option>10 km</option></select>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">👥 Số slot</label>
        <div class="filter-btns">
          <button class="filter-btn filter-btn--active">Tất cả</button>
          <button class="filter-btn">1–2</button>
          <button class="filter-btn">3–4</button>
          <button class="filter-btn">5+</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-group__label">🏸 Hình thức</label>
        <div class="filter-btns">
          <button class="filter-btn filter-btn--active">Giao lưu</button>
          <button class="filter-btn">Đối kháng</button>
          <button class="filter-btn">Tập luyện</button>
        </div>
      </div>
    </div>

    <div class="bottom-sheet__footer">
      <button class="btn btn--secondary">Đóng</button>
      <button class="btn btn--primary">Áp dụng (12 kết quả)</button>
    </div>
  </div>
</body>
</html>
