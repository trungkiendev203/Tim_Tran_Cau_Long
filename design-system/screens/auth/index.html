<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chill Cầu — Đăng nhập | ds:screen:auth-001</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --font-family: 'Inter', -apple-system, sans-serif; --color-primary: #16a34a; --color-primary-hover: #15803d; --color-border: #e2e8f0; --color-danger: #ef4444; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); background: linear-gradient(135deg, #f0fdf4 0%, #f8fafc 50%, #eff6ff 100%); color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    .auth-page { width: 100%; max-width: 400px; }
    .auth-page__brand { text-align: center; margin-bottom: 32px; }
    .auth-page__logo { font-size: 56px; margin-bottom: 8px; }
    .auth-page__name { font-size: 28px; font-weight: 700; color: var(--color-primary); }
    .auth-page__tagline { font-size: 14px; color: #64748b; margin-top: 4px; }

    /* Tabs */
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; background: #f1f5f9; border-radius: 10px; padding: 4px; }
    .auth-tab { flex: 1; padding: 10px; font-size: 14px; font-weight: 500; text-align: center; border: none; background: none; cursor: pointer; font-family: var(--font-family); border-radius: 8px; transition: all 150ms ease; color: #64748b; }
    .auth-tab--active { background: #fff; color: #1e293b; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

    .auth-card { background: #fff; border: 1px solid var(--color-border); border-radius: 16px; padding: 28px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07); }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1.5px solid var(--color-border); border-radius: 8px; font-family: var(--font-family); transition: border-color 150ms ease; }
    .form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(22,163,74,0.08); }
    .form-input::placeholder { color: #94a3b8; }

    .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .form-checkbox { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #64748b; }
    .form-checkbox input { accent-color: var(--color-primary); }
    .form-link { font-size: 13px; color: #2563eb; text-decoration: none; font-weight: 500; }
    .form-link:hover { text-decoration: underline; }

    .btn-block { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-family: var(--font-family); transition: background 150ms ease; }
    .btn-block--primary { background: var(--color-primary); color: #fff; }
    .btn-block--primary:hover { background: var(--color-primary-hover); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; font-size: 12px; color: #94a3b8; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }

    .btn-google { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; border: 1.5px solid var(--color-border); border-radius: 8px; background: #fff; cursor: pointer; font-family: var(--font-family); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-google:hover { background: #f8fafc; }

    .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: #64748b; }
    .auth-footer a { color: var(--color-primary); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body data-ds-id="ds:screen:auth-001">
  <div class="auth-page">
    <div class="auth-page__brand">
      <div class="auth-page__logo">🏸</div>
      <h1 class="auth-page__name">Chill Cầu</h1>
      <p class="auth-page__tagline">Chơi Cầu Lông Thông Minh Hơn</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab auth-tab--active" data-ds-id="ds:screen:auth-001--login-tab">Đăng nhập</button>
      <button class="auth-tab" data-ds-id="ds:screen:auth-001--register-tab">Đăng ký</button>
    </div>

    <div class="auth-card" data-ds-id="ds:comp:auth-form-001">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <input class="form-input" type="password" placeholder="••••••••" />
      </div>
      <div class="form-row">
        <label class="form-checkbox"><input type="checkbox" /> Ghi nhớ</label>
        <a href="#" class="form-link">Quên mật khẩu?</a>
      </div>
      <button class="btn-block btn-block--primary">Đăng nhập</button>
      <div class="divider">hoặc</div>
      <button class="btn-google">🔵 Đăng nhập với Google</button>
    </div>

    <div class="auth-footer">Chưa có tài khoản? <a href="#">Đăng ký ngay</a></div>
  </div>
</body>
</html>
